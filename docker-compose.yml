services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
      # Persistent uploads (safe default). To use RAM instead:
      # replace with: type: tmpfs / target: /tmp/uploads / tmpfs.size: 536870912
      - uploads:/tmp/uploads
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:
  uploads:
